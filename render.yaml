services:
  - type: web
    name: ai-health-backend
    env: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: HF_ENDPOINT
        value: https://hf-mirror.com
